# =============================================================================
# AutoSteer — Production Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d                     # start all services
#   docker compose logs -f                   # tail logs
#   docker compose down -v                   # stop + remove volumes (!!)
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d  # dev
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &restart-policy
  restart: unless-stopped

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL 16 with pgvector ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: AutoSteer-postgres
    <<: *restart-policy
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U AutoSteer -d AutoSteer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      POSTGRES_USER: AutoSteer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AutoSteer_dev}
      POSTGRES_DB: AutoSteer
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - AutoSteer-network

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: AutoSteer-redis
    <<: *restart-policy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - AutoSteer-network

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: AutoSteer-backend
    <<: *restart-policy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://AutoSteer:${POSTGRES_PASSWORD:-AutoSteer_dev}@postgres:5432/AutoSteer
      REDIS_URL: redis://redis:6379/0
      # Overridable via .env or host env — these defaults are dev-safe:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AutoSteer_API_KEY: ${AutoSteer_API_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY:-dev-change-me-in-production-use-openssl-rand}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-openai}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-gpt-4o-mini}
      DEBUG: ${DEBUG:-false}
    networks:
      - AutoSteer-network

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: AutoSteer_postgres_data
  redis_data:
    name: AutoSteer_redis_data

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  AutoSteer-network:
    name: AutoSteer-network
    driver: bridge
