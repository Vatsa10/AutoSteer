# =============================================================================
# AutoSteer — Development Overrides
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# What this overrides:
#   - Mounts source directory for live code reload (no rebuild needed on changes)
#   - Enables uvicorn --reload for hot-reloading on file changes
#   - Exposes Postgres on the default 5432 port for local tooling
#   - Sets DEBUG=true
#   - Use "docker compose watch" to sync file changes automatically
# =============================================================================

services:

  postgres:
    ports:
      - "5432:5432"                    # default port for local psql / tooling
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U AutoSteer -d AutoSteer"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__/
            - .venv/
            - .pytest_cache/
            - .ruff_cache/
            - uploads/
            - "*.pyc"
    volumes:
      # Hot-reload mount: source code changes reflect instantly in the container.
      - type: bind
        source: ./backend
        target: /app
    environment:
      DEBUG: "true"
    # No env_file needed for dev — environment is inherited from docker-compose.yml.
