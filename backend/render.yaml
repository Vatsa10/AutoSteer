services:
  - type: web
    name: raah-backend
    runtime: python
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: raah-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: raah-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: DEFAULT_LLM_PROVIDER
        value: openai
      - key: DEFAULT_LLM_MODEL
        value: gpt-4o

databases:
  - name: raah-db
    databaseName: raah
    user: raah
    plan: free

  - name: raah-redis
    ipAllowList: []
    plan: free
